# ============================================
# GitHub Actions Workflow — CI/CD Pipeline
# 
# 当推送到 main 或 master 分支时自动触发：
#   1. 检出代码
#   2. 构建两个 Docker 镜像
#   3. 通过 SSH 部署到服务器
# ============================================

name: Deploy Both Applications

on:
  push:
    branches: [main, master]
  workflow_dispatch:   # 允许手动触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: 检出代码
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # Step 2: 登录 Docker Hub（需在 GitHub Secrets 配置）
      - name: 🔑 Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 3: 构建并推送 个人网站 镜像
      - name: 🏗️ Build & Push Personal Site
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/personal-site:latest
            ${{ secrets.DOCKER_USERNAME }}/personal-site:${{ github.sha }}

      # Step 4: 构建并推送 Todo 应用 镜像
      - name: 🏗️ Build & Push Todo App
        uses: docker/build-push-action@v5
        with:
          context: ./todo-app
          file: ./todo-app/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/todo-app:latest
            ${{ secrets.DOCKER_USERNAME }}/todo-app:${{ github.sha }}

      # Step 5: 通过 SSH 部署到服务器
      - name: 🚀 Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/app

            # 拉取最新镜像
            docker compose pull

            # 重启所有服务
            docker compose up -d --remove-orphans

            # 清理旧镜像
            docker image prune -f

            echo "✅ Deployment complete!"
            echo "   Personal Site: http://${{ secrets.SERVER_HOST }}:8080"
            echo "   Todo App:      http://${{ secrets.SERVER_HOST }}:8081"
