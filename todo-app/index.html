<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <h1>Todo App</h1>

    <div class="box">
        <input type="text" id="todoInput" placeholder="Enter a task" />
        <button id="addBtn">Add</button>
    </div>

    <div class="buttons">
        <button class="filter active" data-filter="all">All</button>
        <button class="filter" data-filter="active">Active</button>
        <button class="filter" data-filter="completed">Done</button>
    </div>

    <ul id="todoList"></ul>

    <p id="itemCount">0 tasks left</p>
    <button id="clearBtn">Clear done tasks</button>

    <p class="credit">
        Open source project based on
        <a href="https://github.com/tastejs/todomvc">TodoMVC</a>
    </p>

    <script src="app.js"></script>
</body>
</html>
